apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.26.1 (a9d05d509)
  creationTimestamp: null
  labels:
    io.kompose.service: web-initiate-db
  name: web-initiate-db
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: web-initiate-db
  strategy: {}
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.26.1 (a9d05d509)
      creationTimestamp: null
      labels:
        io.kompose.service: web-initiate-db
    spec:
      containers:
        - command:
            - python3
            - create_db.py
          image: "ghcr.io/andersonsousadasilva23/simplepythonflask:master"

          command:
            - sh
            - -c
            - |
              echo "Waiting for database..."
              until nc -z mariadb 3306; do
              echo "Database not ready..."
              sleep 3
              done
              echo "Database ready!"
              python3 create_db.py

          name: simple-python-flask-init-db
          resources: {}
      restartPolicy: Always
status: {}
